        link:
          type: string
          example: https://prepaid-dev.jpmchase.net:8801/chp-logon/index.html#/iframecard?id=ZcJ/Vk8ZPKhrE0QZOI35yzL71vB62rvV9yAgUhWqAH/9NL1kjhkfjjhkmerjgVcNLtK1oLnKy6YYv%2BIkhokaSM1b4SLeTl%2B2sqg5kDSYOeA==
          description: |
            Link to the Customer Profile
        id:
          type: string
          example: "100000161175"
          description: |
            Card Identifier
    CardDetailResponse:
      type: object
      description: |
        An Object with Card Detail Response for specific Card Id
      required:
        - accountId
        - link
      properties:
        accountId:
          type: string
          example: "12345678912345"
          description: |
            Account Identifier/ Payment Routing Number
        link:
          type: string
          example: https://prepaid-dev.jpmchase.net:8801/chp-logon/index.html#/iframecard?id=ZcJ/Vk8ZPKhrE0QZOI35yzL71vB62rvV9yAgUhWqAH/9NL1kjhkfjjhkmerjgVcNLtK1oLnKy6YYv%2BIkhokaSM1b4SLeTl%2B2sqg5kDSYOeA==
          description: |
            Web link to the Card Holder Profile
    CardUpdateRequest:
      type: object
      description: |
        An Object containing Card Update Request
      properties:
        pin:
          type: string
          description: |
            4 digit ATM pin to be used for associated card.
            Optional field. Only include if setting a new PIN.
        status:
          type: string
          enum:
            - LOCKED
            - UNLOCKED
            - REPLACED
            - CANCELLED
          description: |
            New status of the card after request. Can be locked/unlocked/replaced/cancelled status.
            Optional field. Only use if you want to update the status of the card.
        replacementReason:
          type: string
          enum:
            - LOST
            - STOLEN
            - DAMAGED
            - DEFECTIVE
          description: |
            Reason for replacing card. Only required if status is set to REPLACED.
        cancellingReason:
          type: string
          enum:
            - LOST
            - STOLEN
            - DEACTIVE
          description: |
            Reason for cancelling card. Only required if status is set to CANCELLED.
        maxSpendLimit:
          type: number
          description: |
            The maximum total amount that can be spent in a single day. Resets at 00:00 each day.
          example: 100
          minimum: 0
        maxCashWithdrawalLimit:
          type: number
          description: |
            The total amount of cash that can be withdrawn in a single day. Resets at 00:00 each day.
          example: 100
          minimum: 0
        clearSpendLimit:
          type: boolean
          example: true
          description: |
            Clears spending limits on this card. Set value to TRUE to remove any daily spending limits. If set to TRUE, any maxSpendLimit limit is ignored. You can still apply daily cash withdrawal limits  even when clearSpendLimit is set to TRUE.
        clearCashWithdrawalLimit:
          type: boolean
          example: true
          description: |
            Clears daily cashwithdrawal limits on this card. Set value to TRUE to remove any daily cashwithdrawal limits. If set to TRUE, any maxCashWithdrawalLimit limit is ignored. You can still apply daily spend limits even when clearCashWithdrawalLimit is set to TRUE.
    CardUpdateResponse:
      type: object
      description: |
        An object with response code corresponding to the status of put request operation
      properties:
        message:
          type: string
          example: New Pin Set successfully
          description: |
            Message for PUT operation status
        id:
          type: string
          example: "100000160987"
          description: |
            New Card Identifier to Update
    RecipientType:
      type: string
      enum:
        - RECIPIENT
        - LINKED_ACCOUNT
      nullable: false
      example: RECIPIENT
    RecipientAddress:
      type: object
      description: Recipient's postal address. Always required for RTP payment type.
      required:
        - addressLine1
        - city
        - countryCode
        - state
        - zip
      properties:
        addressLine1:
          type: string
          nullable: false
          minLength: 1
          maxLength: 70
          pattern: ^(.|\s)*\S(.|\s)*$
          description: The building number and street name of the address. Must start with a number. Cannot be a PO box.
          example: 345 Wouda St
        addressLine2:
          type: string
          minLength: 1
          maxLength: 70
          pattern: ^(.|\s)*\S(.|\s)*$
          description: Information to complete the street address, such as apartment number or the name of a building.
          example: Malibu Point
        addressLine3:
          type: string
          minLength: 1
          maxLength: 70
          pattern: ^(.|\s)*\S(.|\s)*$
          description: Further information about an address, such as a locally known area.
          example: Greater Woking
        city:
          type: string
          nullable: false
          minLength: 1
          maxLength: 35
          pattern: ^(.|\s)*\S(.|\s)*$
          description: Whole name of the city or town of the address.
          example: Springfield
        countryCode:
          $ref: "#/components/schemas/CountryCode"
        state:
          type: string
          nullable: false
          minLength: 1
          maxLength: 35
          pattern: ^(.|\s)*\S(.|\s)*$
          description: State code in alpla-2 format. State is mandatory for countries divided into states, such as USA.
          example: ND
        zip:
          type: string
          nullable: false
          minLength: 1
          maxLength: 16
          pattern: ^(.|\s)*\S(.|\s)*$
          description: The postal code, such as a ZIP code in the USA, for the address.
          example: "58008"
    RecipientPartyDetails:
      type: object
      required:
        - type
      properties:
        address:
          description: Address details for the recipient. Mandatory for payments using the RTP payment type.
          $ref: "#/components/schemas/RecipientAddress"
        type:
          $ref: "#/components/schemas/PartyType"
        firstName:
          type: string
          maxLength: 70
          pattern: ^(.|\s)*\S(.|\s)*$
          description: |
            Recipient's first name. Mandatory for recipient type INDIVIDUAL.
          example: Jon
        lastName:
          type: string
          maxLength: 70
          pattern: ^(.|\s)*\S(.|\s)*$
          description: |
            Recipient's last name. Mandatory for recipient type INDIVIDUAL.
          example: Smith
        businessName:
          type: string
          maxLength: 140
          pattern: ^(.|\s)*\S(.|\s)*$
          description: |
            Recipient company name. Mandatory for recipient type ORGANIZATION.
          example: Widget Co.
        contacts:
          type: array
          description: Contact details for the recipient.
          items:
            $ref: "#/components/schemas/RecipientContact"
    RecipientAccount:
