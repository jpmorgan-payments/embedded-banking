  responses:
    "400":
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            error: BAD_REQUEST
            message: Error in Request Formatting
            reasons:
              - reason: CURRENCY_NOT_SUPPORTED
                message: Currency not supported. Make sure you specify a default currency type from ISO 3166.
                field: body .currency
                rejectedValue: USDX
              - reason: INVALID_AMOUNT
                message: Invalid amount specified. Check the amount and retry.
                field: body .amount
                rejectedValue: 123.23.3
    "401":
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            error: UNAUTHORIZED
            message: Request is unauthorized
            reasons:
              - reason: MALFORMED_TOKEN
                message: Provided token does not follow required JWT format. It may also be missing mandatory parts
    "403":
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            error: FORBIDDEN
            message: Unauthorized request. The client does not have access rights to the content.
    "404":
      description: Not Found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            error: NOT_FOUND
            message: The requested resource cannot be found.
    "500":
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            error: INTERNAL_SERVER_ERROR
            message: The server encountered an unexpected condition that prevented it from fulfilling the request.
    "503":
      description: Service Unavailable
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            error: SERVICE_UNAVAILABLE
            message: The server encountered an unexpected condition that prevented it from fulfilling the request.
    "4001":
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/schemas-ApiError"
    "4011":
      description: Unauthenticated
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/schemas-ApiError"
    "4031":
