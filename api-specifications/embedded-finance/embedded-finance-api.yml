      description: Microdeposit verification outcome
      properties:
        status:
          type: string
          enum:
            - VERIFIED
            - FAILED
            - FAILED_MAX_ATTEMPTS_EXCEEDED
    NotificationEventType:
      description: Enum of Notification event types
      type: string
      enum:
        - ACCOUNT_CREATED
        - ACCOUNT_CLOSED
        - TRANSACTION_COMPLETED
        - TRANSACTION_FAILED
        - CLIENT_ONBOARDING
    Notification:
      type: object
