    WebhookCallbackEvent:
      type: object
      required:
        - eventType
        - resourceType
        - resource
      properties:
        eventType:
          type: string
          enum:
            - ACCOUNT_CLOSED
            - ACCOUNT_CREATED
            - TRANSACTION_COMPLETED
            - TRANSACTION_FAILED
            - CLIENT_ONBOARDING
        resourceType:
          type: string
          enum:
            - TRANSACTIONS
            - ACCOUNTS
            - CLIENTS
        error:
          $ref: "#/components/schemas/ApiErrorV2"
        resource:
          type: object
          required:
            - id
      discriminator:
        propertyName: resourceType
        mapping:
          ACCOUNTS: "#/components/schemas/AccountsCallbackEvent"
          TRANSACTIONS: "#/components/schemas/TransactionsCallbackEvent"
          CLIENTS: "#/components/schemas/ClientsCallbackEvent"
    AccountsCallbackEvent:
      type: object
      allOf:
        - $ref: "#/components/schemas/WebhookCallbackEvent"
        - type: object
          properties:
            resource:
              type: object
              required:
                - id
                - clientId
                - paymentRoutingInformation
              properties:
                id:
                  type: string
                  example: 1947f5a1a6ec44b48dda074ef4cb6fd5
                clientId:
                  type: string
                  example: "0030000131"
                label:
                  type: string
                  example: MAIN
                state:
                  type: string
                  example: OPEN
                category:
                  type: string
                  enum:
                    - DDA
                    - LIMITED_DDA
                    - EMBEDDED_DDA
                    - PROCESSING
                    - MANAGEMENT
                  example: EMBEDDED_DDA
                creationTimestamp:
                  type: string
                  format: date-time
                  example: 2023-08-20T15:33:13.448689Z
                paymentRoutingInformation:
                  type: object
                  properties:
                    paymentRoutingNumber:
                      type: string
                      example: "20000046375824"
                    country:
                      type: string
                      example: US
                    status:
                      type: string
                      enum:
                        - ACTIVE
                        - INACTIVE
                      example: ACTIVE
                    routingInformation:
                      type: object
                      properties:
                        type:
                          type: string
                          example: ABA
                        value:
                          type: string
                          example: "02800024"
    TransactionsCallbackEvent:
      type: object
      allOf:
        - $ref: "#/components/schemas/WebhookCallbackEvent"
        - type: object
          properties:
            resource:
              type: object
              required:
                - id
                - debtorAccountId
                - amount
                - currency
              properties:
                id:
                  type: string
                clientId:
                  type: string
                type:
                  type: string
                  example: ACH
                creditorAccountNumber:
                  description: ID of the account to make the payment to
                  type: string
                  example: ...8083
                creditorName:
                  description: Name of the account to make the payment to
                  type: string
                debtorAccountId:
                  description: ID of the account to make the payment from
                  type: string
                  example: dc2eda9084bf40b7a1d8baa8c5e0ea0ax
                debtorAccountNumber:
                  description: Account number to make the payment from
                  type: string
                  example: ...9084
                recipientId:
                  description: Recipient ID of the account to make the payment to
                  type: string
                  example: 616d93a1-ce53-4c71-b03b-02a11396db28
                amount:
                  type: number
                  nullable: false
                  minimum: 0.01
                  example: 100
                currency:
                  type: string
                  description: Payment currency
                status:
                  type: string
                  description: The current status of the transaction as it is processed
                transactionReferenceId:
                  type: string
                  description: Transaction reference id provided by client
                  example: inv-pay-1234
                paymentDate:
                  description: ISO date format - yyyy-MM-dd
                  type: string
                  format: date
                  example: 2022-12-31
    ClientsCallbackEvent:
      type: object
      allOf:
        - $ref: "#/components/schemas/WebhookCallbackEvent"
        - type: object
          properties:
            resource:
              type: object
              required:
                - id
                - status
              properties:
                id:
                  type: string
                  example: "909089090809"
                status:
                  type: string
                  enum:
                    - APPROVED
                    - DECLINED
                    - IN_PROGRESS
                    - NEW
                    - PENDING_USER_ACTION
                    - SUSPENDED
                    - TERMINATED
                    - UNDER_REVIEW
                  example: APPROVED
  responses:
    "400":
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            error: BAD_REQUEST
            message: Error in Request Formatting
            reasons:
              - reason: CURRENCY_NOT_SUPPORTED
                message: Currency not supported. Make sure you specify a default currency type from ISO 3166.
                field: body .currency
                rejectedValue: USDX
              - reason: INVALID_AMOUNT
                message: Invalid amount specified. Check the amount and retry.
                field: body .amount
                rejectedValue: 123.23.3
    "401":
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            error: UNAUTHORIZED
            message: Request is unauthorized
            reasons:
              - reason: MALFORMED_TOKEN
                message: Provided token does not follow required JWT format. It may also be missing mandatory parts
    "403":
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            error: FORBIDDEN
            message: Unauthorized request. The client does not have access rights to the content.
    "404":
      description: Not Found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            error: NOT_FOUND
            message: The requested resource cannot be found.
    "422":
      description: Unprocessable Entity
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorSmbdo"
          example:
            code: OARS422.CLT.02
            message: Unable to perform Client verifications for ID [%s] due to its status.
    "500":
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            error: INTERNAL_SERVER_ERROR
            message: The server encountered an unexpected condition that prevented it from fulfilling the request.
    "503":
      description: Service Unavailable
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            error: SERVICE_UNAVAILABLE
            message: The server encountered an unexpected condition that prevented it from fulfilling the request.
    "4001":
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/schemas-ApiError"
    "4011":
      description: Unauthenticated
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/schemas-ApiError"
    "4031":
      description: Forbidden - Unauthorized Access
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/schemas-ApiError"
    "4041":
      description: The server can not find the requested resource
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/schemas-ApiError"
    "5001":
      description: The server encountered an unexpected condition that prevented it from fulfilling the request.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/schemas-ApiError"
    "5031":
      description: Service Unavailable - API Processing Error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/schemas-ApiError"
    400_documents:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            error: BAD_REQUEST
            message: Error in Request Formatting
            reasons:
              - reason: INVALID_DOCUMENT_TYPE
                message: The document type is not valid.
                field: query .type
                rejectedValue: USDX
    400_recipients:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          examples:
            ErrorInvalidLinkedAccountOwnership:
              description: Linked account provided failed recipient ownership validation
              summary: Failed Linked Account Ownership Validation
              value:
                error: BAD_REQUEST
                message: Error in Request
                reasons:
                  - reason: FAILED_LINKED_ACCOUNT_OWNERSHIP_VALIDATION
                    message: Account provided failed recipient ownership validation.
                    field: body .account
            ErrorInvalidAddress:
              description: Address is invalid
              summary: Invalid Address
              value:
                error: BAD_REQUEST
                message: Error in Request Formatting
                reasons:
                  - reason: INVALID_ADDRESS
                    message: Invalid address zipCode. Check the zipCode provided and retry.
                    field: body .partyDetails.address.zipCode
                    rejectedValue: "32812"
    400V2:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorV2"
          example:
            title: Error in Request Formatting
            httpStatus: 400
            context:
              - code: "11005"
                message: Currency not supported. Make sure you specify a default currency type from ISO 3166.
                location: BODY
                field: .currency
    responses-400:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorSmbdo"
          example:
            code: OARS400.CLT.01
            message: Invalid request.
            reasons:
              - field: products
                message: Unexpected value 'FOO_EMBEDDED_PAYMENTS'
              - field: products
                message: Unexpected value 'FOO_EMBEDDED_BANKING'
    responses-401:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorSmbdo"
          example:
            code: OARS401.GEN.01
            message: Invalid token.
    responses-403:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorSmbdo"
          example:
            code: OARS403.CLT.05
            message: Platform is not authorized to access client.
    responses-404:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorSmbdo"
          example:
            code: OARS404.PRT.01
            message: Party with ID [2000000555] not found.
    responses-500:
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorSmbdo"
          example:
            code: OARS500.GEN.01
            message: Something went wrong. Please try again later.
    responses-503:
      description: Service Unavailable
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorSmbdo"
          example:
            code: OARS503.GEN.08
            message: The server encountered an unexpected condition that prevented it from fulfilling the request.
