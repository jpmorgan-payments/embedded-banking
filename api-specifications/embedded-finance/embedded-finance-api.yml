          type: string
          enum:
            - CLIENTS
            - TRANSACTIONS
        resourceId:
          type: string
        error:
          $ref: "#/components/schemas/ApiErrorV2"
        resource:
          type: object
      discriminator:
        propertyName: resourceType
        mapping:
          CLIENTS: "#/components/schemas/ClientsCallbackEvent"
          TRANSACTIONS: "#/components/schemas/WebhookCallbackEvent"
    ClientsCallbackEvent:
      type: object
      allOf:
        - $ref: "#/components/schemas/WebhookCallbackEvent"
        - type: object
          properties:
            resource:
              type: object
              properties:
                clientId:
                  type: string
                  example: "0009389258"
                platformId:
                  type: string
                  example: "1236"
                products:
                  type: array
                  items:
                    type: string
                onboardingStatus:
                  description: Current onboarding status
                  type: string
                  example: CLIENTS_ONBOARDING_COMPLETED
    TransactionsCallbackEvent:
      type: object
      allOf:
        - $ref: "#/components/schemas/WebhookCallbackEvent"
        - type: object
          properties:
            resource:
              type: object
              properties:
                transactionId:
                  type: string
                type:
                  type: string
                  example: ACH
                creditorAccount:
                  description: ID of the account to make the payment to
                  type: string
                  example: dc2eda9084bf40b7a1d8baa8c5e0ea0ax
                debtorAccount:
                  description: ID of the account to make the payment from
                  type: string
                  example: dc2eda9084bf40b7a1d8baa8c5e0ea0ax
                amount:
                  type: number
                  nullable: false
                  minimum: 0.01
                  example: 100
                currency:
                  type: string
                  description: Payment currency
                transactionStatus:
                  type: string
                  description: The current status of the transaction as it is processed
                transactionReferenceId:
                  type: string
                  description: Transaction reference id provided by client
                  example: inv-pay-1234
                paymentDate:
                  description: ISO date format - yyyy-MM-dd
                  type: string
                  format: date
                  example: 2022-12-31
  responses:
    "400":
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            error: BAD_REQUEST
            message: Error in Request Formatting
            reasons:
              - reason: CURRENCY_NOT_SUPPORTED
                message: Currency not supported. Make sure you specify a default currency type from ISO 3166.
                field: body .currency
                rejectedValue: USDX
              - reason: INVALID_AMOUNT
                message: Invalid amount specified. Check the amount and retry.
                field: body .amount
                rejectedValue: 123.23.3
    "401":
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            error: UNAUTHORIZED
            message: Request is unauthorized
            reasons:
              - reason: MALFORMED_TOKEN
                message: Provided token does not follow required JWT format. It may also be missing mandatory parts
    "403":
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            error: FORBIDDEN
            message: Unauthorized request. The client does not have access rights to the content.
    "404":
      description: Not Found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            error: NOT_FOUND
            message: The requested resource cannot be found.
    "500":
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            error: INTERNAL_SERVER_ERROR
            message: The server encountered an unexpected condition that prevented it from fulfilling the request.
    "503":
      description: Service Unavailable
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            error: SERVICE_UNAVAILABLE
            message: The server encountered an unexpected condition that prevented it from fulfilling the request.
    "4001":
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/schemas-ApiError"
    "4011":
      description: Unauthenticated
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/schemas-ApiError"
    "4031":
      description: Forbidden - Unauthorized Access
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/schemas-ApiError"
    "4041":
      description: The server can not find the requested resource
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/schemas-ApiError"
    "5001":
      description: The server encountered an unexpected condition that prevented it from fulfilling the request.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/schemas-ApiError"
    "5031":
      description: Service Unavailable - API Processing Error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/schemas-ApiError"
    400_documents:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            error: BAD_REQUEST
            message: Error in Request Formatting
            reasons:
              - reason: INVALID_DOCUMENT_TYPE
                message: The document type is not valid.
                field: query .type
                rejectedValue: USDX
    400_recipients:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          examples:
            ErrorInvalidLinkedAccountOwnership:
              description: Linked account provided failed recipient ownership validation
              summary: Failed Linked Account Ownership Validation
              value:
                error: BAD_REQUEST
                message: Error in Request
                reasons:
                  - reason: FAILED_LINKED_ACCOUNT_OWNERSHIP_VALIDATION
                    message: Account provided failed recipient ownership validation.
                    field: body .account
            ErrorInvalidAddress:
              description: Address is invalid
              summary: Invalid Address
              value:
                error: BAD_REQUEST
                message: Error in Request Formatting
                reasons:
                  - reason: INVALID_ADDRESS
                    message: Invalid address zipCode. Check the zipCode provided and retry.
                    field: body .partyDetails.address.zipCode
                    rejectedValue: 32812
    400V2:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorV2"
          example:
            title: Error in Request Formatting
            httpStatus: 400
            context:
              - code: 11005
                message: Currency not supported. Make sure you specify a default currency type from ISO 3166.
                location: BODY
                field: .currency
  parameters:
    countryCode:
      name: countryCode
      in: query
      description: Two-letter ISO code for a country, such as US for USA.
      required: false
      schema:
        type: string
        minLength: 2
        maxLength: 2
        pattern: ^[A-Z]{2}$
        example: US
        description: ISO 3166-1 Alpha-2 Country Code
    documentCategory:
      name: documentCategory
      in: query
      description: Document category type.
      required: false
      schema:
        type: string
        enum:
          - IDENTITY_VERIFICATION
    legalStructure:
      name: legalStructure
      in: query
      description: url encoded legalStructure type.
      required: false
      schema:
        type: string
        minLength: 1
        maxLength: 50
    platformId:
      name: platform_id
      in: header
      description: Unique identifier for the platform.
      required: true
      example: 5191231
      schema:
        type: string
    clientId:
      name: client_id
      in: header
      description: Unique Client Identifier (C2) with following pattern - '^\d{10}$'
      example: "0030000131"
      schema:
        type: string
        pattern: ^\d{10}$
    clientIdQuery:
      name: client_id
      in: query
      description: Unique client identifier
      example: "0030000131"
      required: true
      schema:
        type: string
        pattern: ^\d{10}$
    documentType:
      name: type
      in: query
      description: The type of document. Can be terms and conditions or disclosure and consent documents.
      required: true
      schema:
        type: string
        enum:
          - TERMS_CONDITION
          - DISCLOSURE_AND_CONSENT
    product:
      name: product
      in: query
      description: The product type to which the legal documents apply
      schema:
        type: string
        enum:
          - EB
          - EP
      required: true
    token:
      name: token
      in: header
      description: JWT Client token
      required: false
      schema:
        type: string
    checkDepositID:
      in: path
      name: id
      description: Check deposit identification number.
      required: true
      example: "1234567890"
      schema:
        type: string
    pageSize:
      name: limit
      in: query
      description: Number of records per page.
      schema:
        type: integer
        minimum: 1
        maximum: 25
        default: 25
    pageNo:
      name: page
      in: query
      description: Page Number
      schema:
        type: integer
        default: 0
        minimum: 0
    clientIdHeader:
      name: client_id
      in: header
      description: Unique client identifier
      example: "0030000131"
      required: false
      schema:
        type: string
        pattern: ^\d{10}$
    accountId:
      name: id
      in: path
      description: Unique account identifier
      schema:
        type: string
      required: true
      example: dc2eda9084bf40b7a1d8baa8c5e0ea0ax
    pageNo1:
      name: page
      in: query
      description: Page Number
      schema:
        type: integer
        default: 0
    parameters-pageSize:
      name: limit
      in: query
      description: Number of records per page.
      schema:
        type: integer
        minimum: 1
    parameters-pageNo:
      name: page
      in: query
      description: Page Number
      schema:
        type: integer
        minimum: 1
